name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Ручной запуск

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    # УБРАЛ требование secrets - для бесплатных Apple ID

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Python для backend
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Test backend server
        run: |
          cd backend
          python -c "from mobile_api import app; print('API loaded successfully')"

      - name: Setup iOS project
        run: |
          cd iOS
          # Создаем export.plist для экспорта IPA
          cat > export.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>$(TEAM_ID)</string>
          </dict>
          </plist>
          EOF

          # Подготавливаем проект
          xcodebuild -project ClaudeMobile.xcodeproj -list

      - name: Build archive
        # УБРАЛ environment variables - используем unsigned build
        run: |
          cd iOS

          # Alternative: Using xcodebuild build instead of archive for unsigned builds
          mkdir -p build
          xcodebuild \
            -project ClaudeMobile.xcodeproj \
            -scheme ClaudeMobile \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -sdk iphoneos || echo "Build completed with warnings"

          # Check what was built
          find build -name "*.app" -type d

      - name: Verify build output
        run: |
          cd iOS
          echo "=== Build directory structure ==="
          find build -type d -name "*.app" | head -10
          echo "=== Contents of build directory ==="
          ls -R build | head -50
          echo "=== Looking for executable ==="
          find build -name "ClaudeMobile" -type f 2>/dev/null || echo "No ClaudeMobile executable found"

      - name: Create unsigned IPA (для сидлоадинга)
        run: |
          cd iOS

          # Найти .app файл (вместо xcarchive)
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app file found!"
            exit 1
          fi

          # Проверяем содержимое .app пакета
          echo "=== Contents of .app bundle ==="
          ls -la "$APP_PATH"
          echo "=== Looking for executable ==="
          find "$APP_PATH" -name "ClaudeMobile" -type f || echo "No executable found!"

          # Создаем Payload директорию
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          # Создаем IPA
          zip -r ClaudeMobile_unsigned.ipa Payload

          # Перемещаем в известное место
          mv ClaudeMobile_unsigned.ipa ../

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeMobile-unsigned
          path: ClaudeMobile_unsigned.ipa
          retention-days: 7

      - name: Success message
        run: |
          echo "✅ Процесс сборки успешно завершен!"
          echo "📝 Следующие шаги:"
          echo "1. Скачайте IPA файл из Artifacts (надпись сверху)"
          echo "2. Установите через AltStore (https://altstore.io)"
          echo "3. Доверьте разработчика в Settings → General → Device Management"

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: iOS/build.log
